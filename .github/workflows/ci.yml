name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install ruff

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: hotelchat_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: hotelchat_test
      DB_USER: postgres
      DB_PASSWORD: testpass
      JWT_SECRET: test-secret-key-for-ci
      ANTHROPIC_API_KEY: dummy
      OLLAMA_BASE_URL: http://localhost:11434
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run schema migrations
        run: |
          PGPASSWORD=testpass psql -h localhost -U postgres -d hotelchat_test \
            -f ../database/00_extensions.sql \
            -f ../database/01_users.sql \
            -f ../database/02_clients.sql \
            -f ../database/03_sessions.sql \
            -f ../database/04_messages.sql \
            -f ../database/05_knowledge.sql \
            -f ../database/06_projects_tasks.sql \
            -f ../database/07_reminders.sql \
            -f ../database/08_audit_logs.sql \
            -f ../database/09_crawl_jobs.sql

      - name: Run tests
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet"

  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t hotelchat-app ./backend

      - name: Build frontend image
        run: docker build --target builder -t hotelchat-next ./frontend
