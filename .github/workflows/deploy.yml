name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    # Chỉ deploy nếu CI pass
    needs: []  # Thêm job CI nếu muốn sequential

    environment:
      name: production
      url: ${{ secrets.APP_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/hotel-chatbot

            echo "=== Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Build & restart services ==="
            docker compose pull || true
            docker compose build --no-cache app next
            docker compose up -d --remove-orphans

            echo "=== Wait for health check ==="
            sleep 15
            STATUS=$(curl -sf http://localhost/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "fail")

            if [ "$STATUS" != "ok" ]; then
              echo "Health check FAILED ($STATUS) — rolling back"
              git stash
              docker compose up -d --remove-orphans
              exit 1
            fi

            echo "=== Deploy SUCCESS ==="
            docker image prune -f
